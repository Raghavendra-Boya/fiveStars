What is HTML:
HTML (HyperText Markup Language) is the standard markup language for documents designed to be displayed in a web browser. It can be assisted by technologies such as Cascading Style Sheets (CSS) and scripting languages such as JavaScript.
time line of HTML:
-1991: HTML was created by Tim Berners-Lee, a British scientist, to facilitate the sharing and updating of documents over the Internet.
-1995: HTML 2.0 was released, which included new features such as tables and forms.
-1997: HTML 3.2 was released, which included support for scripting languages and multimedia elements.
-1999: HTML 4.01 was released, which included support for stylesheets and improved accessibility features.
-2008: HTML5 was introduced, which included new features such as video and audio support

HTML4 vs HTML5:
feature                             HTML4                                     HTML5
doctype declaration          <!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">    <!DOCTYPE html>
semantic elements             Limited support for semantic elements such as <div> and <span>    Introduced new semantic elements such as <header>, <footer>, <article>, and <section>
forms and input types          Limited support for forms and input types    Introduced new form elements and input types such as <input type="email">, <input type="date">, and <input type="range">
audio and video support          Limited support for audio and video playback    Introduced native support for audio and video playback using the <audio> and <video> elements

    core components of HTML:
    1. tags
    2. elements
    3. attributes

    1. tags:
    Tags are the building blocks of HTML. They are used to define the structure and content of a web page. Tags are enclosed in angle brackets (< >) and usually come in pairs, with an opening tag and a closing tag. For example, the <p> tag is used to define a paragraph, and it has an opening tag <p> and a closing tag </p>.

    tyes of tags:
    1. self-closing tags: These tags do not have a closing tag and are used for elements that do not require any content. Examples of self-closing tags include <img>, <br>, and <hr>.
    2. container tags: These tags have both an opening and a closing tag and are used for elements that contain content. Examples of container tags include <div>, <p>, and <h1>.

        tags are divide into two chategories:
        1. semantic tags: These tags provide meaning to the content they enclose. Examples of semantic tags include <header>, <footer>, <article>, and <section>.
        2. non-semantic tags: These tags do not provide any meaning to the content they enclose. Examples of non-semantic tags include <div> and <span>.

    2. elemets:
    elements are nothing but the combination of opening and closing tags along with the content they enclose. For example, the following is an example of a paragraph element:
    <p>This is a paragraph.</p>

    types of elements:
    1. block-level elements: These elements take up the full width of their parent container and start on a new line. Examples of block-level elements include <div>, <p>, and <h1>.
    2. inline elements: These elements only take up as much width as necessary and do not start on a new line. Examples of inline elements include <span>, <a>, and <strong>.

    3. attributes:
    syntax:
    <element attribute="value">Content</element>
    Attributes provide additional information about an element. They are specified in the opening tag of an element

    types of attributes:
    1. global attributes: These attributes can be used on any HTML element. Examples of global attributes include id, class, and style.
    2. Element specific attributes: These attributes are specific to certain HTML elements. Examples of specific
